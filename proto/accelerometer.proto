syntax = "proto3";

package accel;

message AccelPacket {
    int64 timestamp = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}

message AccelModule {
    int64 timestamp = 1;
    float module = 2;
}

service AccelerometerService {
    // Узел A: шлет поток сырых координат, получает обратно поток вычисленных модулей
    rpc StreamAccelData(stream AccelPacket) returns (stream AccelModule);

    // Узел B: получает от сервера поток сырых координат, возвращает поток вычисленных модулей
    rpc ProcessAccelData(stream AccelModule) returns (stream AccelPacket); 
}